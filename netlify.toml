# Hosting config for https://framecast.amitrawat.dev
# Deploys are pushed from GitHub Actions (.github/workflows/netlify.yml);
# this file carries the headers and build settings.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# PWA: the service worker and manifest must never be served stale.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-cache"

# Hashed build assets are immutable.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
