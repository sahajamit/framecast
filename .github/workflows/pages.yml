# The app moved to https://framecast.amitrawat.dev (Netlify, see netlify.yml).
# This deploys a static redirect so old github.io links keep working.
name: Deploy redirect to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Build redirect page
        run: |
          mkdir -p redirect
          cat > redirect/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta http-equiv="refresh" content="0; url=https://framecast.amitrawat.dev/" />
              <link rel="canonical" href="https://framecast.amitrawat.dev/" />
              <title>framecast has moved</title>
            </head>
            <body style="font-family: system-ui; background: #0B0B0C; color: #F5F0E8; display: grid; place-items: center; height: 100vh; margin: 0">
              <p>framecast moved to <a style="color: #FFB020" href="https://framecast.amitrawat.dev/">framecast.amitrawat.dev</a></p>
            </body>
          </html>
          HTML
          cp redirect/index.html redirect/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: redirect
      - id: deployment
        uses: actions/deploy-pages@v4
